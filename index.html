<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fireworks</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="custom-cursor" aria-hidden="true">✨</div>
    <button id="fullscreen-btn" class="toolbar-btn" type="button" aria-label="Toggle fullscreen" title="Fullscreen">
      <svg id="icon-enter" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3" />
      </svg>
      <svg id="icon-exit" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" hidden>
        <path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7" />
      </svg>
    </button>
    <button id="daynight-btn" class="toolbar-btn toolbar-btn-large" type="button" aria-label="Toggle day mode" title="Day mode">
      <svg id="icon-sun" viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="4" fill="currentColor" fill-opacity="0.35" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
      </svg>
      <svg id="icon-moon" viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="2.5" hidden>
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor" fill-opacity="0.2" />
      </svg>
    </button>
    <button id="rain-btn" class="toolbar-btn toolbar-btn-large" type="button" aria-label="Toggle rain" title="Rain">
      <svg id="icon-rain" viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M6 7a4 4 0 0 1 8 0 3 3 0 0 1 3 3 3 3 0 0 1 3 3" stroke-linecap="round" />
        <path d="M8 17v3M12 16v4M16 17v3" stroke-linecap="round" />
      </svg>
    </button>
    <button id="constellation-btn" class="toolbar-btn toolbar-btn-large" type="button" aria-label="Show constellation" title="Constellation">
      <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2l1.2 3.6L17 7l-3.8 1.4L12 12l-1.2-3.6L7 7l3.8-1.4L12 2z" stroke-linejoin="round" />
        <path d="M5 16l0.8 2.2L8 19l-2.2 0.8L5 22l-0.8-2.2L2 19l2.2-0.8L5 16z" stroke-linejoin="round" />
        <path d="M19 14l0.6 1.6L21 16l-1.4 0.4L19 18l-0.6-1.6L17 16l1.4-0.4L19 14z" stroke-linejoin="round" />
      </svg>
    </button>
    <script src="fireworks.js"></script>
  </body>
</html>
